name: .NET CI

on:
  workflow_call:
    inputs:
      solution-file:
        description: 'Solution file name (e.g., MyProject.slnx)'
        required: true
        type: string
      dotnet-version:
        description: '.NET SDK version'
        required: false
        type: string
        default: '10.x'
      private-references-repo:
        description: 'Repository containing private references (owner/repo). If empty, skips checkout.'
        required: false
        type: string
        default: ''
      collect-coverage:
        description: 'Run tests with coverlet coverage collection'
        required: false
        type: boolean
        default: false
      coverage-files:
        description: 'Newline-separated list of coverage XML paths to upload'
        required: false
        type: string
        default: ''
      upload-codecov:
        description: 'Upload coverage to Codecov'
        required: false
        type: boolean
        default: false
      upload-codacy:
        description: 'Upload coverage to Codacy'
        required: false
        type: boolean
        default: false
      local-pack-projects:
        description: 'Newline-separated .csproj paths to pack into ./nupkg before restore'
        required: false
        type: string
        default: ''
    secrets:
      PRIVATE_REFERENCES_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false
      CODACY_PROJECT_TOKEN:
        required: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:

      - name: Checkout main repository
        uses: actions/checkout@v4

      # Consumer repos pass this via: private-references-repo: ${{ vars.PRIVATE_REFERENCES_REPO }}
      - name: Checkout private references
        if: ${{ inputs.private-references-repo != '' }}
        uses: actions/checkout@v4
        with:
          path: external/LobotomyCorp_Data
          persist-credentials: false
          repository: ${{ inputs.private-references-repo }}
          token: ${{ secrets.PRIVATE_REFERENCES_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Pack local projects
        if: ${{ inputs.local-pack-projects != '' }}
        run: |
          mkdir -p ./nupkg
          echo "${{ inputs.local-pack-projects }}" | while IFS= read -r project; do
            if [ -n "$project" ]; then
              dotnet pack "$project" -c Release -o ./nupkg
            fi
          done

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source github --username open-lobotomy --password ${{ github.token }} --store-password-in-clear-text || true

      - name: Restore dependencies
        run: dotnet restore --ignore-failed-sources ${{ inputs.solution-file }}

      - name: Build
        run: dotnet build --no-restore ${{ inputs.solution-file }}

      - name: Test
        run: >-
          dotnet test
          ${{ inputs.collect-coverage && '/p:CollectCoverage=true /p:CoverletOutput="./coverage.opencover.xml" /p:CoverletOutputFormat=opencover' || '' }}
          --no-build --verbosity normal --blame-hang-timeout 10s
          ${{ inputs.solution-file }}

      - name: Upload coverage reports to Codecov
        if: ${{ inputs.upload-codecov && inputs.coverage-files != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.coverage-files }}

      - name: Upload coverage reports to Codacy
        if: ${{ inputs.upload-codacy && inputs.coverage-files != '' }}
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ${{ inputs.coverage-files }}

  ci-windows:
    name: CI (Windows)
    needs: [ci]
    uses: open-lobotomy/.github/.github/workflows/dotnet-ci-windows.yml@main
    with:
      solution-file: ${{ inputs.solution-file }}
      dotnet-version: ${{ inputs.dotnet-version }}
      private-references-repo: ${{ inputs.private-references-repo }}
      local-pack-projects: ${{ inputs.local-pack-projects }}
    secrets:
      PRIVATE_REFERENCES_TOKEN: ${{ secrets.PRIVATE_REFERENCES_TOKEN }}
