name: .NET CI

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: '.NET SDK version'
        required: false
        type: string
        default: '10.x'
      private-references-repo:
        description: 'Repository containing private references (owner/repo). If empty, skips checkout.'
        required: false
        type: string
        default: ''
      local-pack-projects:
        description: 'Newline-separated .csproj paths to pack into ./nupkg before restore'
        required: false
        type: string
        default: ''
    secrets:
      PRIVATE_REFERENCES_TOKEN:
        required: false
      PACKAGES_TOKEN:
        required: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:

      - name: Checkout main repository
        uses: actions/checkout@v4

      # Consumer repos pass this via: private-references-repo: ${{ vars.PRIVATE_REFERENCES_REPO }}
      - name: Checkout private references
        if: ${{ inputs.private-references-repo != '' }}
        uses: actions/checkout@v4
        with:
          path: external/LobotomyCorp_Data
          persist-credentials: false
          repository: ${{ inputs.private-references-repo }}
          token: ${{ secrets.PRIVATE_REFERENCES_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Pack local projects
        if: ${{ inputs.local-pack-projects != '' }}
        run: |
          mkdir -p ./nupkg
          echo "${{ inputs.local-pack-projects }}" | while IFS= read -r project; do
            if [ -n "$project" ]; then
              dotnet pack "$project" -c Release -o ./nupkg
            fi
          done

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source github --username open-lobotomy --password ${{ secrets.PACKAGES_TOKEN || github.token }} --store-password-in-clear-text || true

      - name: Restore tools
        run: |
          if [ ! -f .config/dotnet-tools.json ]; then
            echo "::error file=.config/dotnet-tools.json::This reusable workflow requires a local .NET tool manifest in the consuming repository. Add .config/dotnet-tools.json with the dotnet-ci tool (for example: 'dotnet new tool-manifest' then 'dotnet tool install dotnet-ci') or update the repository to the current org CI bootstrap."
            exit 1
          fi

          dotnet tool restore

      - name: Run CI
        run: dotnet ci --check
